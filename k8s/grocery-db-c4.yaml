apiVersion: v1
kind: ConfigMap
metadata:
  name: grocery-db-init
  namespace: team6
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS items (
        id SERIAL PRIMARY KEY,
        name VARCHAR(100) NOT NULL UNIQUE,
        category VARCHAR(50) NOT NULL,
        quantity INTEGER NOT NULL DEFAULT 0 CHECK (quantity >= 0),
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS pricing (
        id SERIAL PRIMARY KEY,
        item_id INTEGER NOT NULL REFERENCES items(id) ON DELETE CASCADE,
        price DECIMAL(10,2) NOT NULL CHECK (price >= 0),
        effective_date TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        UNIQUE(item_id, effective_date)
    );

    CREATE TABLE IF NOT EXISTS analytics (
        id SERIAL PRIMARY KEY,
        request_id VARCHAR(255) NOT NULL UNIQUE,
        served_id VARCHAR(255) NOT NULL,
        request_type VARCHAR(255) NOT NULL,
        start_time TIMESTAMP NOT NULL,
        end_time TIMESTAMP,
        total_duration_ms INTEGER,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE OR REPLACE FUNCTION update_updated_at_column()
    RETURNS TRIGGER AS $$
    BEGIN
        NEW.updated_at = CURRENT_TIMESTAMP;
        RETURN NEW;
    END;
    $$ language 'plpgsql';

    DROP TRIGGER IF EXISTS update_items_updated_at ON items;
    CREATE TRIGGER update_items_updated_at BEFORE UPDATE ON items
        FOR EACH ROW EXECUTE FUNCTION update_updated_at_column();

    INSERT INTO items (name, category, quantity) VALUES
        ('bread', 'bread', 100),
        ('milk', 'dairy', 50),
        ('eggs', 'dairy', 75),
        ('chicken', 'meat', 40),
        ('beef', 'meat', 30),
        ('apples', 'produce', 80),
        ('bananas', 'produce', 90),
        ('soda', 'party', 60),
        ('napkins', 'party', 120)
    ON CONFLICT (name) DO NOTHING;

    INSERT INTO pricing (item_id, price)
    SELECT id, price FROM (VALUES
        ('bread', 3.99),
        ('milk', 4.50),
        ('eggs', 5.25),
        ('chicken', 8.99),
        ('beef', 12.99),
        ('apples', 2.99),
        ('bananas', 1.99),
        ('soda', 3.50),
        ('napkins', 4.99)
    ) AS seed(item_name, price)
    JOIN items ON items.name = seed.item_name
    ON CONFLICT DO NOTHING;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grocery-db
  namespace: team6
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grocery-db
  template:
    metadata:
      labels:
        app: grocery-db
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_DB
              value: "grocery_db"
            - name: POSTGRES_USER
              value: "admin"
            - name: POSTGRES_PASSWORD
              value: "team6"
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: data
          emptyDir: {}
        - name: init
          configMap:
            name: grocery-db-init
---
apiVersion: v1
kind: Service
metadata:
  name: grocery-db
  namespace: team6
spec:
  selector:
    app: grocery-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  type: ClusterIP
