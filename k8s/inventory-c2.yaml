apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory
  namespace: team6
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory
  template:
    metadata:
      labels:
        app: inventory
    spec:
      containers:
        - name: inventory
          image: 192.168.1.129:5000/team6/inventory-service:latest
          imagePullPolicy: Always
          env:
            - name: PRICING_GRPC_ADDR
              value: "pricing.team6.svc.cluster.local:50053"
            - name: ZMQ_PUB_ADDR
              value: "tcp://0.0.0.0:5556"
            - name: DB_HOST
              value: "172.16.6.226"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "grocery_db"
            - name: DB_USER
              value: "admin"
            - name: DB_PASSWORD
              value: "team6"
          ports:
            - containerPort: 50051
            - containerPort: 5556
---
apiVersion: v1
kind: Service
metadata:
  name: inventory
  namespace: team6
spec:
  selector:
    app: inventory
  type: NodePort
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
      nodePort: 30081
    - name: zmq
      port: 5556
      targetPort: 5556
      nodePort: 30557
