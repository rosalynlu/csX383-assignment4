apiVersion: apps/v1
kind: Deployment
metadata:
  name: pricing
  namespace: team6
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pricing
  template:
    metadata:
      labels:
        app: pricing
    spec:
      containers:
        - name: pricing
          image:  192.168.1.129:5000/team6/pricing-service:latest
          imagePullPolicy: Always
          env:
            - name: DB_HOST
              value: "172.16.6.226"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "grocery_db"
            - name: DB_USER
              value: "admin"
            - name: DB_PASSWORD
              value: "team6"
          ports:
            - containerPort: 50053
---
apiVersion: v1
kind: Service
metadata:
  name: pricing
  namespace: team6
spec:
  selector:
    app: pricing
  ports:
    - name: grpc
      port: 50053
      targetPort: 50053
  type: ClusterIP
