apiVersion: apps/v1
kind: Deployment
metadata:
  name: robot-dairy
  namespace: team6
spec:
  replicas: 1
  selector:
    matchLabels:
      app: robot-dairy
  template:
    metadata:
      labels:
        app: robot-dairy
    spec:
      containers:
        - name: robot
          image: 192.168.1.129:5000/team6/robot-service:latest
          imagePullPolicy: Always
          env:
            - name: ROBOT_NAME
              value: "dairy"
            - name: INVENTORY_ADDR
              value: "172.16.6.164:31082"
            - name: ZMQ_SUB_ADDR
              value: "tcp://172.16.6.164:31558"
