frr version 10.5.1
frr defaults traditional
hostname r2
service integrated-vtysh-config
log stdout

interface eth1
 ip address 10.0.12.2/24
 ip ospf cost 100

interface eth2
 ip address 10.0.52.2/24
 ip ospf cost 10

interface eth3
 ip address 10.0.26.1/24
 ip ospf cost 20

router ospf
 network 10.0.12.0/24 area 0
 network 10.0.52.0/24 area 0
 network 10.0.26.0/24 area 0
